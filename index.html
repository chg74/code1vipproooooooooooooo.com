<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خدمات تيك توك</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma, Arial, sans-serif;
}

body{
    background:#f3f4f6;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box{
    width:350px;
    background:#fff;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    text-align:center;
}

h2{
    margin-bottom:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#ff0050;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:.9;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    margin-top:10px;
}

#formPage,
#loadingPage,
#successPage{
    display:none;
}

.loader{
    width:60px;
    height:60px;
    border:6px solid #ddd;
    border-top:6px solid #ff0050;
    border-radius:50%;
    margin:20px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.check{
    font-size:70px;
    color:green;
    margin-bottom:10px;
}

.countdown{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="box">

    <!-- الصفحة الرئيسية -->
    <div id="menuPage">
        <h2>اختر الخدمة</h2>

        <button onclick="openForm('مشاهدات')">
            👀 مشاهدات
        </button>

        <button onclick="openForm('لايكات')">
            ❤️ لايكات
        </button>
    </div>

    <!-- صفحة الطلب -->
    <div id="formPage">
        <h2 id="serviceTitle"></h2>

        <input
            type="text"
            id="link"
            placeholder="ضع رابط فيديو تيك توك"
        >

        <input
            type="number"
            id="amount"
            placeholder="اكتب العدد المطلوب"
        >

        <button onclick="submitOrder()">
            تأكيد
        </button>
    </div>

    <!-- التحميل -->
    <div id="loadingPage">
        <h2>جاري معالجة الطلب...</h2>

        <div class="loader"></div>

        <div class="countdown">
            الرجاء الانتظار...
        </div>
    </div>

    <!-- النجاح -->
    <div id="successPage">
        <div class="check">✔</div>

        <h2>تم إرسال الطلب بنجاح</h2>

        <div class="countdown" id="timer">
            سيتم الرجوع خلال 5 ثوانٍ
        </div>
    </div>

</div>

<script>

let currentService = "";

function openForm(service){

    currentService = service;

    document.getElementById("menuPage").style.display = "none";
    document.getElementById("formPage").style.display = "block";

    document.getElementById("serviceTitle").innerText =
        "طلب " + service;
}

function submitOrder(){

    let link = document.getElementById("link").value.trim();
    let amount = document.getElementById("amount").value.trim();

    if(link === ""){
        alert("ضع رابط تيك توك");
        return;
    }

    if(!link.includes("tiktok")){
        alert("يرجى إدخال رابط تيك توك صحيح");
        return;
    }

    if(amount === ""){
        alert("اكتب العدد المطلوب");
        return;
    }

    document.getElementById("formPage").style.display = "none";
    document.getElementById("loadingPage").style.display = "block";

    setTimeout(function(){

        document.getElementById("loadingPage").style.display = "none";
        document.getElementById("successPage").style.display = "block";

        let seconds = 5;

        document.getElementById("timer").innerText =
            "سيتم الرجوع خلال " + seconds + " ثوانٍ";

        let countdown = setInterval(function(){

            seconds--;

            document.getElementById("timer").innerText =
                "سيتم الرجوع خلال " + seconds + " ثوانٍ";

            if(seconds <= 0){

                clearInterval(countdown);

                document.getElementById("successPage").style.display = "none";
                document.getElementById("menuPage").style.display = "block";

                document.getElementById("link").value = "";
                document.getElementById("amount").value = "";
            }

        },1000);

    },3000);
}

</script>

</body>
</html>
