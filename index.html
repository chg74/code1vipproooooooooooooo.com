<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جاري الانتظار</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f8f8f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

/* اللودر */
.tiktok-loader{
    position: relative;
    width:70px;
    height:40px;
    margin:0 auto 18px;
}

/* الكور */
.ball{
    position:absolute;
    width:18px;
    height:18px;
    border-radius:50%;
    top:50%;
    transform:translateY(-50%);
}

/* الأزرق */
.blue{
    background:#00f2ea;
    animation: moveBlue 1s ease-in-out infinite;
}

/* الأحمر */
.red{
    background:#ff0050;
    animation: moveRed 1s ease-in-out infinite;
}

/* حركة يمين شمال */
@keyframes moveBlue{
    0%{ left:5px; }
    50%{ left:45px; }
    100%{ left:5px; }
}

@keyframes moveRed{
    0%{ left:45px; }
    50%{ left:5px; }
    100%{ left:45px; }
}

/* علامة الصح */
.success{
    display:none;
    width:62px;
    height:62px;
    background:#2dbf4f;
    border-radius:50%;
    position:relative;
    margin:0 auto 18px;
}

.success::after{
    content:"✓";
    color:white;
    font-size:42px;
    font-weight:bold;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-55%);
}

/* النص */
.text{
    font-size:22px;
    color:#222;
    font-weight:500;
}

</style>
</head>
<body>

<div class="container">
    
    <div class="tiktok-loader" id="loader">
        <div class="ball blue"></div>
        <div class="ball red"></div>
    </div>

    <div class="success" id="success"></div>
    <div class="text" id="status">جاري الانتظار...</div>

</div>

<script>
setTimeout(function(){
    document.getElementById("loader").style.display = "none";
    document.getElementById("success").style.display = "block";
    document.getElementById("status").innerText = "تم التأكيد بنجاح";
},3000);
</script>

</body>
</html>
