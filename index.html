<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ساعة SPORT</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
}

/* الفيديو */
iframe{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    z-index:1;
}

/* اللوجو */
.channel-logo{
    position:fixed;
    top:20px;
    right:20px;
    width:300px;
    z-index:9999;
}

.channel-logo img{
    width:100%;
}

/* LIVE */
.live{
    position:fixed;
    top:20px;
    left:20px;
    background:red;
    color:white;
    padding:10px 18px;
    border-radius:50px;
    font-size:20px;
    font-weight:bold;
    font-family:Arial;
    z-index:9999;
}

</style>
</head>

<body>

<div class="live">LIVE</div>

<!-- حط رابط اللوجو -->
<div class="channel-logo">
    <img src="ضع_رابط_الصورة_هنا">
</div>

<iframe
src="https://mandoosports.yoo7.com/h27-html?id=aHR0cHM6Ly95Ny5tYW5kb29zcG9ydHMud29ya2Vycy5kZXYvP3VybD1odHRwOi8vaGV0MDAwLjRyb3V3YW5kYS1zaG9wLnN0b3JlL2xpdmUvNjk4NTQyMTEvaW5kZXgubTN1OA"
allow="fullscreen; autoplay"
allowfullscreen>
</iframe>

<script>

/* فتح ملء الشاشة تلقائي */
window.onload = function () {

    const elem = document.documentElement;

    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
    }

};

</script>

</body>
</html>
