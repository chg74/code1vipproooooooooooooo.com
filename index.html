<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تأكيد</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma, Arial;
}

body{
    background:#f3f3f3;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* شاشة التحميل */
.loading-box{
    text-align:center;
}

.loader{
    width:65px;
    height:65px;
    border:7px solid #e5e5e5;
    border-top:7px solid #244a9b;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.loading-text{
    margin-top:18px;
    font-size:28px;
    color:#222;
}

/* شاشة النجاح */
.success-box{
    display:none;
    text-align:center;
}

.check{
    width:95px;
    height:95px;
    background:#34c759;
    border-radius:50%;
    margin:auto;
    position:relative;
    animation:pop .4s ease;
}

.check::after{
    content:'✔';
    color:white;
    font-size:55px;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

@keyframes pop{
    0%{
        transform:scale(0);
    }
    100%{
        transform:scale(1);
    }
}

.success-text{
    margin-top:15px;
    font-size:26px;
    color:#34c759;
    font-weight:500;
}

</style>
</head>

<body>

<!-- التحميل -->
<div class="loading-box" id="loading">
    <div class="loader"></div>
    <div class="loading-text">الرجاء الانتظار..</div>
</div>

<!-- النجاح -->
<div class="success-box" id="success">
    <div class="check"></div>
    <div class="success-text">تم التأكيد بنجاح</div>
</div>

<script>

setTimeout(() => {

    document.getElementById("loading").style.display = "none";
    document.getElementById("success").style.display = "block";

}, 3000);

</script>

</body>
</html>
