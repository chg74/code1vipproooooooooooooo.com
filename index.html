<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids TV Admin</title>

<style>
body{
margin:0;
background:#111;
font-family:Tahoma;
padding:20px;
color:white;
}

.box{
max-width:500px;
margin:auto;
background:#1c1c1c;
padding:20px;
border-radius:25px;
box-shadow:0 0 20px #000;
}

h1{
text-align:center;
margin-bottom:20px;
color:#00ff99;
}

input{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:12px;
background:#2b2b2b;
color:white;
font-size:16px;
box-sizing:border-box;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.play{
background:green;
color:white;
}

.stop{
background:red;
color:white;
}

img{
width:120px;
height:120px;
border-radius:20px;
object-fit:cover;
display:block;
margin:auto;
margin-top:20px;
background:white;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:15px 25px;
border-radius:15px;
font-size:18px;
display:none;
z-index:999;
color:white;
}

.online{
margin-top:20px;
background:#242424;
padding:15px;
border-radius:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="box">

<h1>🎬 لوحة الأدمن</h1>

<input type="text" id="name" placeholder="اسم الكرتون">

<input type="text" id="video" placeholder="رابط الفيديو https">

<input type="file" id="logoFile" accept="image/*">

<img id="preview" hidden>

<button class="play" onclick="startLive()">تشغيل</button>

<button class="stop" onclick="stopLive()">إيقاف</button>

<div class="online">
👀 المشاهدين الآن:
<span id="views">0</span>
</div>

</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAUc2cH9gVE7RECiW19XQXjNZQxVH96sFE",
authDomain: "zezo-59a8d.firebaseapp.com",
databaseURL: "https://zezo-59a8d-default-rtdb.firebaseio.com",
projectId: "zezo-59a8d",
storageBucket: "zezo-59a8d.appspot.com",
messagingSenderId: "49183098248",
appId: "1:49183098248:web:37e3fb16744042a1bb263d"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let logoBase64 = "";

document.getElementById("logoFile").addEventListener("change", function(e){

const file = e.target.files[0];

const reader = new FileReader();

reader.onload = function(){

logoBase64 = reader.result;

document.getElementById("preview").src = logoBase64;

document.getElementById("preview").hidden = false;

};

reader.readAsDataURL(file);

});

function showToast(msg,color){

const t = document.getElementById("toast");

t.innerText = msg;

t.style.background = color;

t.style.display = "block";

setTimeout(()=>{
t.style.display = "none";
},2500);

}

function startLive(){

db.ref("kids-tv").set({

status:true,

name:document.getElementById("name").value,

video:document.getElementById("video").value,

logo:logoBase64

});

showToast("✅ تم تشغيل البث","green");

}

function stopLive(){

db.ref("kids-tv").set({
status:false
});

showToast("📺 تم إيقاف القناة","red");

}

db.ref("watching").on("value",(snap)=>{

document.getElementById("views").innerText = snap.numChildren();

});

</script>

</body>
</html>
